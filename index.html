<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership Manager Pro</title>
    <style>
        /* ========================================
           ALL STYLES IN ONE FILE
           ======================================== */
        
        /* ----- Reset & Variables ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #007AFF;
            --primary-dark: #0055BF;
            --bg-primary: #F5F5F7;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F0F0F2;
            --text-primary: #1C1C1E;
            --text-secondary: #6E6E73;
            --text-tertiary: #AEAEB2;
            --border-color: #D2D2D7;
            --shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 8px 40px rgba(0, 0, 0, 0.12);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --radius-full: 9999px;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
        }

        [data-theme="dark"] {
            --bg-primary: #000000;
            --bg-secondary: #1C1C1E;
            --bg-tertiary: #2C2C2E;
            --text-primary: #F5F5F7;
            --text-secondary: #AEAEB2;
            --text-tertiary: #636366;
            --border-color: #38383A;
            --glass-bg: rgba(28, 28, 30, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
        }

        /* ----- Base ----- */
        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: var(--transition);
            -webkit-font-smoothing: antialiased;
        }

        /* ----- Navigation ----- */
        .main-nav {
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0 var(--spacing-lg);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            gap: var(--spacing-md);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            cursor: pointer;
            flex-shrink: 0;
        }

        .nav-logo {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .brand-name {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.3px;
            white-space: nowrap;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            flex: 1;
            justify-content: center;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-sm) var(--spacing-md);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-family);
            white-space: nowrap;
        }

        .nav-link svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .nav-link:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            flex-shrink: 0;
        }

        .weather-display {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .weather-temp {
            font-weight: 600;
            color: var(--text-primary);
        }

        .nav-search {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            transition: var(--transition);
        }

        .nav-search:focus-within {
            background: var(--bg-secondary);
            box-shadow: 0 0 0 2px var(--primary);
        }

        .nav-search input {
            border: none;
            background: transparent;
            padding: 4px 0;
            font-size: 13px;
            font-family: var(--font-family);
            color: var(--text-primary);
            width: 100px;
            outline: none;
        }

        .nav-search input::placeholder {
            color: var(--text-secondary);
        }

        .nav-datetime {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            font-size: 12px;
            color: var(--text-secondary);
            border-right: 1px solid var(--border-color);
        }

        .nav-date {
            font-weight: 500;
            color: var(--text-primary);
        }

        .theme-toggle {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            background: var(--border-color);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
        }

        /* ----- Main Content ----- */
        #mainContent {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--spacing-lg);
            min-height: calc(100vh - 60px);
        }

        /* ----- Dashboard Styles ----- */
        .dashboard-page {
            animation: fadeIn 0.4s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .stat-card {
            padding: var(--spacing-md);
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: var(--spacing-xs);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .stat-change {
            font-size: 11px;
            font-weight: 500;
            margin-top: var(--spacing-xs);
            padding: 2px 8px;
            border-radius: var(--radius-full);
            display: inline-block;
        }

        .stat-change.positive {
            color: #34C759;
            background: rgba(52, 199, 89, 0.1);
        }
        .stat-change.negative {
            color: #FF3B30;
            background: rgba(255, 59, 48, 0.1);
        }
        .stat-change.neutral {
            color: var(--text-secondary);
            background: var(--bg-tertiary);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .dashboard-card {
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            transition: var(--transition);
        }

        .dashboard-card:hover {
            box-shadow: var(--shadow-hover);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
        }

        .card-title {
            font-size: 17px;
            font-weight: 600;
        }

        .card-action {
            color: var(--primary);
            background: none;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-full);
            transition: var(--transition);
            font-family: var(--font-family);
        }

        .card-action:hover {
            background: var(--bg-tertiary);
        }

        /* Payment Summary */
        .payment-summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: var(--spacing-md);
            margin-top: var(--spacing-sm);
        }

        .payment-item {
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            text-align: center;
        }

        .payment-item.kpay {
            background: rgba(0, 122, 255, 0.1);
            border: 1px solid rgba(0, 122, 255, 0.2);
        }
        .payment-item.wave {
            background: rgba(255, 204, 0, 0.1);
            border: 1px solid rgba(255, 204, 0, 0.2);
        }
        .payment-item.aya {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.2);
        }

        .payment-item .label {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: var(--spacing-xs);
        }
        .payment-item .amount {
            font-size: 21px;
            font-weight: 700;
        }
        .payment-item .count {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: var(--spacing-xs);
        }

        /* Transactions */
        .transaction-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .transaction-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-sm) 0;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .transaction-avatar {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 15px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .transaction-details .name {
            font-weight: 500;
        }

        .transaction-details .product {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .transaction-amount {
            font-weight: 600;
        }
        .transaction-amount.positive {
            color: #34C759;
        }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 500;
        }
        .status-badge.status-success {
            background: rgba(52, 199, 89, 0.15);
            color: #34C759;
        }
        .status-badge.status-warning {
            background: rgba(255, 149, 0, 0.15);
            color: #FF9500;
        }
        .status-badge.status-danger {
            background: rgba(255, 59, 48, 0.15);
            color: #FF3B30;
        }
        .status-badge.status-info {
            background: rgba(90, 200, 250, 0.15);
            color: #5AC8FA;
        }

        /* Buttons */
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-family);
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-danger {
            background: #FF3B30;
            color: white;
        }
        .btn-danger:hover {
            background: #D63030;
        }

        .btn-success {
            background: #34C759;
            color: white;
        }

        .btn-sm {
            padding: 4px 12px;
            font-size: 11px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: saturate(180%) blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-hover);
            animation: slideUp 0.3s ease;
            min-width: 400px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 {
            font-size: 21px;
            font-weight: 600;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .modal-close:hover {
            background: var(--border-color);
        }

        .modal-body {
            max-height: calc(90vh - 120px);
            overflow-y: auto;
        }

        /* Forms */
        .form-group {
            margin-bottom: var(--spacing-md);
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: var(--spacing-xs);
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 13px;
            font-family: var(--font-family);
            transition: var(--transition);
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }

        .form-actions {
            display: flex;
            gap: var(--spacing-sm);
            justify-content: flex-end;
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--border-color);
        }

        /* Toast */
        #toastContainer {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 400px;
        }

        .toast {
            padding: 12px 16px;
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-hover);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideInRight 0.3s ease;
            font-size: 13px;
        }

        .toast-hide {
            animation: slideOutRight 0.3s ease forwards;
        }

        .toast-success {
            border-left: 4px solid #34C759;
        }
        .toast-error {
            border-left: 4px solid #FF3B30;
        }
        .toast-warning {
            border-left: 4px solid #FF9500;
        }
        .toast-info {
            border-left: 4px solid var(--primary);
        }

        .toast-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-secondary);
            padding: 0 4px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
            opacity: 0.5;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100px);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .nav-search input {
                width: 80px;
            }
            .weather-desc {
                display: none;
            }
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-wrap: wrap;
                height: auto;
                padding: var(--spacing-sm) 0;
                gap: var(--spacing-sm);
            }

            .nav-links {
                flex-wrap: wrap;
                gap: var(--spacing-xs);
                order: 3;
                width: 100%;
                justify-content: center;
                padding: var(--spacing-sm) 0;
            }

            .nav-link {
                font-size: 11px;
                padding: var(--spacing-xs) var(--spacing-sm);
            }
            .nav-link span {
                display: none;
            }

            .nav-datetime {
                display: none;
            }

            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: var(--spacing-sm);
            }

            .stat-value {
                font-size: 21px;
            }

            .payment-summary-grid {
                grid-template-columns: 1fr;
            }

            #mainContent {
                padding: var(--spacing-sm);
            }

            .modal {
                min-width: auto;
                width: 95vw;
                padding: var(--spacing-lg);
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .weather-display {
                display: none;
            }
            .nav-search input {
                width: 60px;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .brand-name {
                font-size: 14px;
            }
        }
    </style>
    <!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <div class="nav-logo">M</div>
                <span class="brand-name">Membership Manager Pro</span>
            </div>

            <div class="nav-links">
                <button class="nav-link active" data-page="dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" rx="2"/>
                        <rect x="14" y="3" width="7" height="7" rx="2"/>
                        <rect x="3" y="14" width="7" height="7" rx="2"/>
                        <rect x="14" y="14" width="7" height="7" rx="2"/>
                    </svg>
                    <span>Dashboard</span>
                </button>
                <button class="nav-link" data-page="members">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
                        <circle cx="19" cy="9" r="2"/>
                        <path d="M15 21v-2a4 4 0 0 1 4-4h2"/>
                    </svg>
                    <span>Members</span>
                </button>
                <button class="nav-link" data-page="analytics">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="14" width="4" height="7" rx="1"/>
                        <rect x="10" y="9" width="4" height="12" rx="1"/>
                        <rect x="17" y="4" width="4" height="17" rx="1"/>
                        <line x1="3" y1="21" x2="21" y2="21"/>
                    </svg>
                    <span>Analytics</span>
                </button>
                <button class="nav-link" data-page="calendar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="6" width="18" height="15" rx="2"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <circle cx="8" cy="14" r="1" fill="currentColor"/>
                        <circle cx="12" cy="14" r="1" fill="currentColor"/>
                        <circle cx="16" cy="14" r="1" fill="currentColor"/>
                        <circle cx="8" cy="18" r="1" fill="currentColor"/>
                        <circle cx="12" cy="18" r="1" fill="currentColor"/>
                        <circle cx="16" cy="18" r="1" fill="currentColor"/>
                    </svg>
                    <span>Calendar</span>

            <div class="nav-actions">
                <div class="weather-display">
                    <span>🌤️</span>

        </div>
    </nav>

    <!-- Main Content -->
    <main id="mainContent"></main>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script>
        // ========================================
        // ALL JAVASCRIPT IN ONE FILE
        // ========================================

        // ----- STORAGE SERVICE -----
        const StorageService = {
            STORAGE_KEY: 'membership_manager_data',

            getDefaultData() {
                return {
                    members: [],
                    transactions: [],
                    settings: { theme: 'light', currency: 'MMK' },
                    lastUpdated: new Date().toISOString()
                };
            },

            load() {
                try {
                    const stored = localStorage.getItem(this.STORAGE_KEY);
                    if (stored) {
                        const parsed = JSON.parse(stored);
                        return { ...this.getDefaultData(), ...parsed };
                    }
                } catch (e) { console.error('Error loading data:', e); }
                return this.getDefaultData();
            },

            save() {
                try {
                    this.data.lastUpdated = new Date().toISOString();
                    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.data));
                    return true;
                } catch (e) { console.error('Error saving data:', e); return false; }
            },

            data: null,

            init() {
                this.data = this.load();
                return this;
            },

            getMembers() { return this.data.members || []; },
            getTransactions() { return this.data.transactions || []; },

            getMember(id) {
                return this.data.members.find(m => m.id === id) || null;
            },

            addMember(memberData) {
                const purchaseDate = memberData.purchaseDate || new Date().toISOString().split('T')[0];
                
                const member = {
                    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
                    ...memberData,
                    createdAt: new Date(purchaseDate).toISOString(),
                    updatedAt: new Date().toISOString(),
                    isActive: true,
                    history: []
                };
                this.data.members.push(member);
                this.save();
                return member;
            },

            updateMember(id, updates) {
                const index = this.data.members.findIndex(m => m.id === id);
                if (index === -1) return null;
                this.data.members[index] = {
                    ...this.data.members[index],
                    ...updates,
                    updatedAt: new Date().toISOString()
                };
                this.save();
                return this.data.members[index];
            },

            deleteMember(id) {
                this.data.members = this.data.members.filter(m => m.id !== id);
                this.save();
                return true;
            },

            addTransaction(transactionData) {
                const purchaseDate = transactionData.purchaseDate || new Date().toISOString().split('T')[0];
                
                const transaction = {
                    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
                    ...transactionData,
                    createdAt: new Date(purchaseDate).toISOString()
                };
                this.data.transactions.push(transaction);
                this.save();
                return transaction;
            },

            getMemberTransactions(memberId) {
                return this.data.transactions.filter(t => t.memberId === memberId);
            },

            getTotalRevenue() {
                return this.data.transactions.reduce((sum, t) => sum + (t.amount || 0), 0);
            },

            getStats() {
                return {
                    totalMembers: this.data.members.length,
                    totalTransactions: this.data.transactions.length,
                    totalRevenue: this.getTotalRevenue(),
                    storageUsed: new Blob([localStorage.getItem(this.STORAGE_KEY)]).size,
                    lastUpdated: this.data.lastUpdated
                };
            },

            exportData() {
                return JSON.stringify(this.data, null, 2);
            },

            importData(jsonData) {
                try {
                    const data = JSON.parse(jsonData);
                    if (!data.members || !data.transactions) throw new Error('Invalid data');
                    this.data = { ...this.getDefaultData(), ...data };
                    this.save();
                    return true;
                } catch (e) { console.error('Error importing:', e); return false; }
            },

            clearAllData() {
                this.data = this.getDefaultData();
                this.save();
                return true;
            }
        };

        // Initialize storage
        const storage = StorageService.init();

        // ----- UI UTILITIES -----
        const UI = {
            formatCurrency(amount) {
                return `${amount.toLocaleString()} Ks`;
            },

            formatDate(date) {
                if (!date) return 'N/A';
                return new Date(date).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            },

            formatDateTime(date) {
                if (!date) return 'N/A';
                return new Date(date).toLocaleString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            },

            getExpiryStatus(expiryDate) {
                if (!expiryDate) return { label: 'N/A', type: 'info' };
                const now = new Date();
                const expiry = new Date(expiryDate);
                const daysDiff = Math.ceil((expiry - now) / (1000 * 60 * 60 * 24));

                if (daysDiff < 0) return { label: 'Expired', type: 'danger' };
                if (daysDiff === 0) return { label: 'Expires Today', type: 'warning' };
                if (daysDiff <= 3) return { label: `Expires in ${daysDiff}d`, type: 'warning' };
                if (daysDiff <= 7) return { label: `Expires in ${daysDiff}d`, type: 'info' };
                return { label: 'Active', type: 'success' };
            },

            toast(message, type = 'info', duration = 3000) {
                const container = document.getElementById('toastContainer');
                const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };

                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.innerHTML = `
                    <span>${icons[type] || 'ℹ️'}</span>
                    <span style="flex:1;">${message}</span>
                    <button class="toast-close" onclick="this.parentElement.remove()">✕</button>
                `;

                container.appendChild(toast);
                setTimeout(() => {
                    toast.classList.add('toast-hide');
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            },

            createModal(title, content, onClose = null) {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';

                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-header">
                        <h2>${title}</h2>
                        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
                    </div>
                    <div class="modal-body">${content}</div>
                `;

                overlay.appendChild(modal);
                document.body.appendChild(overlay);

                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        overlay.remove();
                        if (onClose) onClose();
                    }
                });

                return overlay;
            }
        };

        // ========================================
        // DASHBOARD
        // ========================================
        class Dashboard {
            constructor(container) {
                this.container = container;
                this.members = storage.getMembers();
                this.transactions = storage.getTransactions();
            }

            render() {
                const stats = this.calculateStats();
                this.container.innerHTML = `
                    <div class="dashboard-page">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-label">Total Revenue</div>
                                <div class="stat-value">${UI.formatCurrency(stats.totalRevenue)}</div>
                                <div class="stat-change positive">↑ 12.5%</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Today's Revenue</div>
                                <div class="stat-value">${UI.formatCurrency(stats.todayRevenue)}</div>
                                <div class="stat-change ${stats.todayChange >= 0 ? 'positive' : 'negative'}">
                                    ${stats.todayChange >= 0 ? '↑' : '↓'} ${Math.abs(stats.todayChange).toFixed(1)}%
                                </div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Monthly Revenue</div>
                                <div class="stat-value">${UI.formatCurrency(stats.monthlyRevenue)}</div>
                                <div class="stat-change neutral">This month</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Total Members</div>
                                <div class="stat-value">${stats.totalMembers}</div>
                                <div class="stat-change positive">${stats.activeMembers} active</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Doujinshi</div>
                                <div class="stat-value">${stats.doujinshiCount}</div>
                                <div class="stat-change neutral">${((stats.doujinshiCount / stats.totalMembers) * 100 || 0).toFixed(1)}%</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Manhwa</div>
                                <div class="stat-value">${stats.manhwaCount}</div>
                                <div class="stat-change neutral">${((stats.manhwaCount / stats.totalMembers) * 100 || 0).toFixed(1)}%</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Lifetime Members</div>
                                <div class="stat-value">${stats.lifetimeCount}</div>
                                <div class="stat-change neutral">${((stats.lifetimeCount / stats.totalMembers) * 100 || 0).toFixed(1)}%</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Active Rate</div>
                                <div class="stat-value">${stats.activeRate.toFixed(1)}%</div>
                                <div class="stat-change ${stats.activeRate >= 70 ? 'positive' : 'neutral'}">Active</div>
                            </div>
                        </div>

                        <div class="dashboard-grid">
                            <div class="dashboard-card">
                                <div class="card-header">
                                    <h3 class="card-title">Payment Summary</h3>
                                </div>
                                <div class="payment-summary-grid">
                                    ${this.renderPaymentSummary()}
                                </div>
                            </div>
                            <div class="dashboard-card">
                                <div class="card-header">
                                    <h3 class="card-title">Quick Stats</h3>
                                </div>
                                ${this.renderQuickStats()}
                            </div>
                        </div>

                        <div class="dashboard-card">
                            <div class="card-header">
                                <h3 class="card-title">Recent Transactions</h3>
                                <button class="card-action" onclick="app.navigateTo('members')">View All</button>
                            </div>
                            <div class="transaction-list">
                                ${this.renderRecentTransactions()}
                            </div>
                        </div>

                        <div class="dashboard-card" style="margin-top: var(--spacing-lg);">
                            <div class="card-header">
                                <h3 class="card-title">⚠️ Expiry Alerts</h3>
                            </div>
                            ${this.renderExpiryAlerts()}
                        </div>
                    </div>
                `;
            }

            calculateStats() {
                const members = this.members;
                const transactions = this.transactions;
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

                const totalRevenue = transactions.reduce((sum, t) => sum + (t.amount || 0), 0);
                const todayRevenue = transactions
                    .filter(t => new Date(t.createdAt) >= today)
                    .reduce((sum, t) => sum + (t.amount || 0), 0);
                const monthlyRevenue = transactions
                    .filter(t => new Date(t.createdAt) >= monthStart)
                    .reduce((sum, t) => sum + (t.amount || 0), 0);

                const totalMembers = members.length;
                const doujinshiCount = members.filter(m => m.product === 'Doujinshi').length;
                const manhwaCount = members.filter(m => m.product === 'Manhwa').length;
                const lifetimeCount = members.filter(m => m.plan === 'Lifetime').length;

                const activeMembers = members.filter(m => {
                    if (!m.expiryDate) return false;
                    return new Date(m.expiryDate) >= now;
                }).length;

                const yesterdayRevenue = this.getYesterdayRevenue();
                const todayChange = yesterdayRevenue ? ((todayRevenue - yesterdayRevenue) / yesterdayRevenue) * 100 : 0;

                return {
                    totalRevenue,
                    todayRevenue,
                    monthlyRevenue,
                    totalMembers,
                    doujinshiCount,
                    manhwaCount,
                    lifetimeCount,
                    activeMembers,
                    activeRate: totalMembers ? (activeMembers / totalMembers) * 100 : 0,
                    todayChange
                };
            }

            getYesterdayRevenue() {
                const now = new Date();
                const yesterday = new Date(now);
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStart = new Date(yesterday.getFullYear(), yesterday.getMonth(), yesterday.getDate());
                const yesterdayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate());

                return this.transactions
                    .filter(t => {
                        const date = new Date(t.createdAt);
                        return date >= yesterdayStart && date < yesterdayEnd;
                    })
                    .reduce((sum, t) => sum + (t.amount || 0), 0);
            }

            renderPaymentSummary() {
                const payments = this.transactions.reduce((acc, t) => {
                    const method = t.paymentMethod || 'Unknown';
                    if (!acc[method]) acc[method] = { amount: 0, count: 0 };
                    acc[method].amount += t.amount || 0;
                    acc[method].count += 1;
                    return acc;
                }, {});

                const methods = {
                    'KPay': { color: 'kpay', icon: '💳' },
                    'Wave Pay': { color: 'wave', icon: '📱' },
                    'Aya Pay': { color: 'aya', icon: '🏦' }
                };

                let html = '';
                for (const [method, data] of Object.entries(payments)) {
                    const info = methods[method] || { color: 'default', icon: '💰' };
                    html += `
                        <div class="payment-item ${info.color}">
                            <div class="label">${info.icon} ${method}</div>
                            <div class="amount">${UI.formatCurrency(data.amount)}</div>
                            <div class="count">${data.count} transactions</div>
                        </div>
                    `;
                }

                if (!html) {
                    html = `<div style="grid-column:1/-1;text-align:center;color:var(--text-secondary);">No payments recorded yet</div>`;
                }
                return html;
            }

            renderQuickStats() {
                const planCounts = this.members.reduce((acc, m) => {
                    const plan = m.plan || 'Unknown';
                    acc[plan] = (acc[plan] || 0) + 1;
                    return acc;
                }, {});

                const plans = ['1 Month', '3 Months', '6 Months', '9 Months', '12 Months', 'Lifetime'];
                let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-sm);">';
                plans.forEach(plan => {
                    const count = planCounts[plan] || 0;
                    html += `
                        <div style="padding:var(--spacing-sm);background:var(--bg-tertiary);border-radius:var(--radius-sm);">
                            <div style="font-weight:500;font-size:11px;color:var(--text-secondary);">${plan}</div>
                            <div style="font-weight:600;">${count} members</div>
                        </div>
                    `;
                });
                html += '</div>';
                return html;
            }

            renderRecentTransactions() {
                const recent = this.transactions
                    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
                    .slice(0, 10);

                if (recent.length === 0) {
                    return `<div class="empty-state"><div class="empty-icon">📭</div><p>No transactions yet</p></div>`;
                }

                return recent.map(t => {
                    const member = storage.getMember(t.memberId);
                    const name = member ? member.username : 'Unknown';
                    const initial = name.charAt(0).toUpperCase();
                    return `
                        <div class="transaction-item">
                            <div class="transaction-info">
                                <div class="transaction-avatar">${initial}</div>
                                <div class="transaction-details">
                                    <div class="name">${name}</div>
                                    <div class="product">${t.product || 'N/A'} • ${t.plan || 'N/A'} • ${UI.formatDate(t.createdAt)}</div>
                                </div>
                            </div>
                            <div class="transaction-amount positive">${UI.formatCurrency(t.amount || 0)}</div>
                        </div>
                    `;
                }).join('');
            }

            renderExpiryAlerts() {
                const now = new Date();
                const sevenDays = new Date(now);
                sevenDays.setDate(sevenDays.getDate() + 7);

                const expiring = this.members.filter(m => {
                    if (!m.expiryDate) return false;
                    const expiry = new Date(m.expiryDate);
                    return expiry >= now && expiry <= sevenDays;
                });

                const expired = this.members.filter(m => {
                    if (!m.expiryDate) return false;
                    return new Date(m.expiryDate) < now;
                });

                if (expiring.length === 0 && expired.length === 0) {
                    return `<div style="text-align:center;padding:var(--spacing-md);color:#34C759;">✅ All memberships are active</div>`;
                }

                let html = '<div style="display:grid;gap:var(--spacing-sm);">';

                expired.forEach(m => {
                    const days = Math.floor((now - new Date(m.expiryDate)) / (1000 * 60 * 60 * 24));
                    html += `
                        <div style="display:flex;justify-content:space-between;align-items:center;padding:var(--spacing-sm);background:rgba(255,59,48,0.1);border-radius:var(--radius-sm);border-left:4px solid #FF3B30;">
                            <div><strong>${m.username}</strong> <span style="font-size:12px;color:var(--text-secondary);">${m.product} • ${m.plan}</span></div>
                            <div><span style="color:#FF3B30;font-weight:600;">Expired ${days} days ago</span></div>
                        </div>
                    `;
                });

                expiring.forEach(m => {
                    const days = Math.ceil((new Date(m.expiryDate) - now) / (1000 * 60 * 60 * 24));
                    const label = days <= 3 ? `⚠️ ${days} days` : `Expires in ${days} days`;
                    html += `
                        <div style="display:flex;justify-content:space-between;align-items:center;padding:var(--spacing-sm);background:rgba(255,149,0,0.1);border-radius:var(--radius-sm);border-left:4px solid #FF9500;">
                            <div><strong>${m.username}</strong> <span style="font-size:12px;color:var(--text-secondary);">${m.product} • ${m.plan}</span></div>
                            <div><span style="color:#FF9500;font-weight:600;">${label}</span></div>
                        </div>
                    `;
                });

                html += '</div>';
                return html;
            }
        }

        // ========================================
        // MEMBERS
        // ========================================
        class Members {
            constructor(container) {
                this.container = container;
                this.members = storage.getMembers();
                this.transactions = storage.getTransactions();
                this.currentPage = 1;
                this.pageSize = 20;
                this.filters = { search: '', product: 'all', plan: 'all', payment: 'all', status: 'all' };
                this.sortBy = 'newest';
                this.selectedMemberId = null;
            }

            render() {
                const filtered = this.getFilteredMembers();
                const sorted = this.sortMembers(filtered);
                const start = (this.currentPage - 1) * this.pageSize;
                const paginated = sorted.slice(start, start + this.pageSize);

                this.container.innerHTML = `
                    <div class="dashboard-page">

                        </div>

                        <div style="display:flex;flex-wrap:wrap;gap:var(--spacing-sm);margin-bottom:var(--spacing-lg);background:var(--glass-bg);padding:var(--spacing-md);border-radius:var(--radius-lg);backdrop-filter:blur(20px);border:1px solid var(--glass-border);">
                            <div style="flex:1;min-width:150px;">
                                <input type="text" id="memberSearch" placeholder="🔍 Search by username..." style="width:100%;padding:8px 14px;border:1px solid var(--border-color);border-radius:var(--radius-full);background:var(--bg-secondary);font-family:var(--font-family);font-size:13px;color:var(--text-primary);">
                            </div>
                            <select id="filterProduct" style="padding:8px 14px;border:1px solid var(--border-color);border-radius:var(--radius-full);background:var(--bg-secondary);font-family:var(--font-family);font-size:13px;color:var(--text-primary);">
                                <option value="all">All Products</option>
                                <option value="Doujinshi">Doujinshi</option>
                                <option value="Manhwa">Manhwa</option>
                            </select>
                            <select id="filterPlan" style="padding:8px 14px;border:1px solid var(--border-color);border-radius:var(--radius-full);background:var(--bg-secondary);font-family:var(--font-family);font-size:13px;color:var(--text-primary);">
                                <option value="all">All Plans</option>
                                <option value="1 Month">1 Month</option>
                                <option value="3 Months">3 Months</option>
                                <option value="6 Months">6 Months</option>
                                <option value="9 Months">9 Months</option>
                                <option value="12 Months">12 Months</option>
                                <option value="Lifetime">Lifetime</option>
                            </select>
                            <select id="filterPayment" style="padding:8px 14px;border:1px solid var(--border-color);border-radius:var(--radius-full);background:var(--bg-secondary);font-family:var(--font-family);font-size:13px;color:var(--text-primary);">
                                <option value="all">All Payments</option>
                                <option value="KPay">KPay</option>
                                <option value="Wave Pay">Wave Pay</option>
                                <option value="Aya Pay">Aya Pay</option>
                            </select>
                            <select id="filterStatus" style="padding:8px 14px;border:1px solid var(--border-color);border-radius:var(--radius-full);background:var(--bg-secondary);font-family:var(--font-family);font-size:13px;color:var(--text-primary);">
                                <option value="all">All Status</option>
                                <option value="active">Active</option>
                                <option value="expiring">Expiring Soon</option>
                                <option value="expired">Expired</option>
                            </select>
                            <select id="sortBy" style="padding:8px 14px;border:1px solid var(--border-color);border-radius:var(--radius-full);background:var(--bg-secondary);font-family:var(--font-family);font-size:13px;color:var(--text-primary);">
                                <option value="newest">Newest First</option>
                                <option value="oldest">Oldest First</option>
                                <option value="username">Username (A-Z)</option>
                                <option value="expiry">Expiry Date</option>
                            </select>
                        </div>

                        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:var(--spacing-sm);margin-bottom:var(--spacing-lg);">
                            <div style="background:var(--glass-bg);padding:var(--spacing-sm);border-radius:var(--radius-sm);text-align:center;border:1px solid var(--glass-border);">
                                <div style="font-size:11px;color:var(--text-secondary);">Total</div>

            getFilteredMembers() {
                let filtered = [...this.members];

                if (this.filters.search) {
                    const search = this.filters.search.toLowerCase();
                    filtered = filtered.filter(m => m.username.toLowerCase().includes(search));
                }

                if (this.filters.product !== 'all') {
                    filtered = filtered.filter(m => m.product === this.filters.product);
                }

                if (this.filters.plan !== 'all') {
                    filtered = filtered.filter(m => m.plan === this.filters.plan);
                }

                if (this.filters.payment !== 'all') {
                    filtered = filtered.filter(m => m.paymentMethod === this.filters.payment);
                }

                if (this.filters.status !== 'all') {
                    const now = new Date();
                    filtered = filtered.filter(m => {
                        if (!m.expiryDate) return false;
                        const expiry = new Date(m.expiryDate);
                        const daysDiff = Math.ceil((expiry - now) / (1000 * 60 * 60 * 24));
                        if (this.filters.status === 'active') return daysDiff > 7;
                        if (this.filters.status === 'expiring') return daysDiff >= 0 && daysDiff <= 7;
                        if (this.filters.status === 'expired') return daysDiff < 0;
                        return true;
                    });
                }

                return filtered;
            }

            sortMembers(members) {
                const sorted = [...members];
                switch (this.sortBy) {
                    case 'newest':
                        return sorted.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    case 'oldest':
                        return sorted.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                    case 'username':
                        return sorted.sort((a, b) => a.username.localeCompare(b.username));
                    case 'expiry':
                        return sorted.sort((a, b) => {
                            if (!a.expiryDate) return 1;
                            if (!b.expiryDate) return -1;
                            return new Date(a.expiryDate) - new Date(b.expiryDate);
                        });
                    default:
                        return sorted;
                }
            }

                const filtered = this.getFilteredMembers();

                this.render();

                    '9 Months': 36000,
                    '12 Months': 48000,
                    'Lifetime': 55000
                };

                const calculateExpiry = (purchaseDate, plan) => {
                    if (!purchaseDate || !plan) return '';
                    const date = new Date(purchaseDate);
                    if (plan === 'Lifetime') {
                        date.setFullYear(date.getFullYear() + 99);
                    } else {
                        const months = parseInt(plan);
                        date.setMonth(date.getMonth() + months);
                    }
                    return date.toISOString().split('T')[0];
                };

                planSelect.addEventListener('change', () => {
                    const plan = planSelect.value;
                    priceInput.value = prices[plan] || 0;

                    this.transactions = storage.getTransactions();
                    this.render();
