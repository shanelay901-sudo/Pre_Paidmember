                                <option value="9 Months">9 Months - 36000 Ks</option>
                                <option value="12 Months">12 Months - 48000 Ks</option>
                                <option value="Lifetime">Lifetime - 55000 Ks</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Payment Method</label>
                            <select id="rPayment" required>
                                <option value="KPay">KPay</option>
                                <option value="Wave Pay">Wave Pay</option>
                                <option value="Aya Pay">Aya Pay</option>
                            </select>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                            <button type="submit" class="btn btn-primary">Renew</button>
                        </div>
                    </form>
                `;

                const modal = UI.createModal('Renew Membership', content);

                modal.querySelector('#renewForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const plan = modal.querySelector('#rPlan').value;
                    const paymentMethod = modal.querySelector('#rPayment').value;
                    const prices = {
                        '1 Month': 5000,
                        '3 Months': 12000,
                        '6 Months': 24000,
                        '9 Months': 36000,
                        '12 Months': 48000,
                        'Lifetime': 55000
                    };
                    const price = prices[plan];

                    const currentExpiry = new Date(member.expiryDate);
                    const now = new Date();
                    const startDate = currentExpiry > now ? currentExpiry : now;
                    const expiryDate = new Date(startDate);
                    if (plan === 'Lifetime') {
                        expiryDate.setFullYear(expiryDate.getFullYear() + 99);
                    } else {
                        const months = parseInt(plan);
                        expiryDate.setMonth(expiryDate.getMonth() + months);
                    }

                    const purchaseDate = now.toISOString().split('T')[0];

                    storage.updateMember(id, {
                        plan: plan,
                        price: price,
                        paymentMethod: paymentMethod,
                        expiryDate: expiryDate.toISOString().split('T')[0],
                        purchaseDate: purchaseDate
                    });

                    storage.addTransaction({
                        memberId: id,
                        username: member.username,
                        product: member.product,
                        plan: plan,
                        amount: price,
                        paymentMethod: paymentMethod,
                        purchaseDate: purchaseDate,
                        expiryDate: expiryDate.toISOString().split('T')[0],
                        type: 'renewal'
                    });

                    UI.toast(`Renewed ${member.username} successfully!`, 'success');
                    modal.remove();
                    this.members = storage.getMembers();
                    this.transactions = storage.getTransactions();
                    this.render();
                });
            }

            deleteMember(id) {
                const member = storage.getMember(id);
                if (!member) return;
                if (confirm(`Are you sure you want to delete "${member.username}"?`)) {
                    storage.deleteMember(id);
                    UI.toast(`Deleted ${member.username}`, 'warning');
                    this.members = storage.getMembers();
                    this.transactions = storage.getTransactions();
                    this.render();
                }
            }

            bindEvents() {
                const searchInput = document.getElementById('memberSearch');
                if (searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        this.filters.search = e.target.value;
                        this.currentPage = 1;
                        this.render();
                    });
                }

                ['filterProduct', 'filterPlan', 'filterPayment', 'filterStatus'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.addEventListener('change', (e) => {
                            const map = {
                                'filterProduct': 'product',
                                'filterPlan': 'plan',
                                'filterPayment': 'payment',
                                'filterStatus': 'status'
                            };
                            this.filters[map[id]] = e.target.value;
                            this.currentPage = 1;
                            this.render();
                        });
                    }
                });

                const sortSelect = document.getElementById('sortBy');
                if (sortSelect) {
                    sortSelect.addEventListener('change', (e) => {
                        this.sortBy = e.target.value;
                        this.render();
                    });
                }
            }
        }

        // ========================================
        // ANALYTICS
        // ========================================
        class Analytics {
            constructor(container) {
                this.container = container;
                this.members = storage.getMembers();
                this.transactions = storage.getTransactions();
            }

            render() {
                const totalRevenue = this.transactions.reduce((s, t) => s + (t.amount || 0), 0);
                const totalMembers = this.members.length;

                const productData = this.members.reduce((acc, m) => {
                    const p = m.product || 'Unknown';
                    if (!acc[p]) acc[p] = { count: 0, revenue: 0 };
                    acc[p].count++;
                    const rev = this.transactions.filter(t => t.memberId === m.id).reduce((s, t) => s + (t.amount || 0), 0);
                    acc[p].revenue += rev;
                    return acc;
                }, {});

                const paymentData = this.transactions.reduce((acc, t) => {
                    const m = t.paymentMethod || 'Unknown';
                    if (!acc[m]) acc[m] = { count: 0, amount: 0 };
                    acc[m].count++;
                    acc[m].amount += t.amount || 0;
                    return acc;
                }, {});

                const planData = this.members.reduce((acc, m) => {
                    const p = m.plan || 'Unknown';
                    acc[p] = (acc[p] || 0) + 1;
                    return acc;
                }, {});

                this.container.innerHTML = `
                    <div class="dashboard-page">
                        <h1 style="font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:var(--spacing-lg);">Analytics Dashboard</h1>

                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-label">Total Revenue</div>
                                <div class="stat-value">${UI.formatCurrency(totalRevenue)}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Total Members</div>
                                <div class="stat-value">${totalMembers}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Avg/Member</div>
                                <div class="stat-value">${UI.formatCurrency(totalMembers ? totalRevenue / totalMembers : 0)}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Transactions</div>
                                <div class="stat-value">${this.transactions.length}</div>
                            </div>
                        </div>

                        <div class="dashboard-grid">
                            <div class="dashboard-card">
                                <div class="card-header"><h3 class="card-title">Product Distribution</h3></div>
                                ${Object.entries(productData).map(([p, d]) => `
                                    <div style="display:flex;justify-content:space-between;padding:var(--spacing-sm);border-bottom:1px solid var(--border-color);">
                                        <span>${p}</span>
                                        <span>${d.count} members (${UI.formatCurrency(d.revenue)})</span>
                                    </div>
                                `).join('') || '<div class="empty-state">No data</div>'}
                            </div>
                            <div class="dashboard-card">
                                <div class="card-header"><h3 class="card-title">Payment Methods</h3></div>
                                ${Object.entries(paymentData).map(([m, d]) => `
                                    <div style="display:flex;justify-content:space-between;padding:var(--spacing-sm);border-bottom:1px solid var(--border-color);">
                                        <span>${m}</span>
                                        <span>${d.count} txs (${UI.formatCurrency(d.amount)})</span>
                                    </div>
                                `).join('') || '<div class="empty-state">No data</div>'}
                            </div>
                        </div>

                        <div class="dashboard-card">
                            <div class="card-header"><h3 class="card-title">Subscription Plans</h3></div>
                            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:var(--spacing-sm);">
                                ${Object.entries(planData).map(([p, c]) => `
                                    <div style="background:var(--bg-tertiary);padding:var(--spacing-sm);border-radius:var(--radius-sm);text-align:center;">
                                        <div style="font-size:11px;color:var(--text-secondary);">${p}</div>
                                        <div style="font-weight:600;font-size:21px;">${c}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // ========================================
        // CALENDAR
        // ========================================
        class Calendar {
            constructor(container) {
                this.container = container;
                this.transactions = storage.getTransactions();
                this.currentDate = new Date();
                this.currentMonth = this.currentDate.getMonth();
                this.currentYear = this.currentDate.getFullYear();
            }

            render() {
                const firstDay = new Date(this.currentYear, this.currentMonth, 1);
                const lastDay = new Date(this.currentYear, this.currentMonth + 1, 0);
                const daysInMonth = lastDay.getDate();
                const startDay = firstDay.getDay();

                let daysHtml = '';
                for (let i = 0; i < startDay; i++) {
                    daysHtml += `<div style="padding:var(--spacing-sm);text-align:center;color:var(--text-tertiary);"></div>`;
                }

                const today = new Date();
                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(this.currentYear, this.currentMonth, day);
                    const isToday = date.toDateString() === today.toDateString();
                    const revenue = this.getDayRevenue(date);

                    daysHtml += `
                        <div style="padding:var(--spacing-sm);text-align:center;border-radius:var(--radius-sm);${isToday ? 'background:var(--primary);color:white;' : ''}${revenue > 0 ? 'background:rgba(52,199,89,0.1);' : ''}border:1px solid var(--border-color);">
                            <div style="font-weight:${isToday ? '700' : '500'};">${day}</div>
                            ${revenue > 0 ? `<div style="font-size:10px;color:${isToday ? 'rgba(255,255,255,0.8)' : 'var(--success)'};">${UI.formatCurrency(revenue)}</div>` : ''}
                        </div>
                    `;
                }

                const monthRevenue = this.transactions
                    .filter(t => {
                        const d = new Date(t.createdAt);
                        return d.getMonth() === this.currentMonth && d.getFullYear() === this.currentYear;
                    })
                    .reduce((s, t) => s + (t.amount || 0), 0);

                this.container.innerHTML = `
                    <div class="dashboard-page">
                        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--spacing-sm);margin-bottom:var(--spacing-lg);">
                            <h1 style="font-size:28px;font-weight:700;letter-spacing:-0.5px;">Revenue Calendar</h1>
                            <div style="display:flex;gap:var(--spacing-sm);align-items:center;">
                                <button class="btn btn-secondary" onclick="app.calendar.navigate(-1)">←</button>
                                <h2 style="font-size:21px;font-weight:600;min-width:150px;text-align:center;">${firstDay.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</h2>
                                <button class="btn btn-secondary" onclick="app.calendar.navigate(1)">→</button>
                                <button class="btn btn-primary" onclick="app.calendar.goToday()">Today</button>
                            </div>
                        </div>

                        <div style="background:var(--glass-bg);border-radius:var(--radius-lg);padding:var(--spacing-md);border:1px solid var(--glass-border);backdrop-filter:blur(20px);margin-bottom:var(--spacing-lg);">
                            <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:var(--spacing-xs);margin-bottom:var(--spacing-sm);">
                                ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `
                                    <div style="text-align:center;font-weight:600;font-size:12px;color:var(--text-secondary);">${d}</div>
                                `).join('')}
                            </div>
                            <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:var(--spacing-xs);">
                                ${daysHtml}
                            </div>
                        </div>

                        <div style="background:var(--glass-bg);border-radius:var(--radius-lg);padding:var(--spacing-md);border:1px solid var(--glass-border);backdrop-filter:blur(20px);">
                            <h3 style="margin-bottom:var(--spacing-md);">Monthly Summary</h3>
                            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--spacing-md);">
                                <div style="text-align:center;">
                                    <div style="font-size:11px;color:var(--text-secondary);">Total Revenue</div>
                                    <div style="font-size:21px;font-weight:700;">${UI.formatCurrency(monthRevenue)}</div>
                                </div>
                                <div style="text-align:center;">
                                    <div style="font-size:11px;color:var(--text-secondary);">Transactions</div>
                                    <div style="font-size:21px;font-weight:700;">${this.transactions.filter(t => { const d = new Date(t.createdAt); return d.getMonth() === this.currentMonth && d.getFullYear() === this.currentYear; }).length}</div>
                                </div>
                                <div style="text-align:center;">
                                    <div style="font-size:11px;color:var(--text-secondary);">Days with Revenue</div>
                                    <div style="font-size:21px;font-weight:700;">${new Set(this.transactions.filter(t => { const d = new Date(t.createdAt); return d.getMonth() === this.currentMonth && d.getFullYear() === this.currentYear; }).map(t => new Date(t.createdAt).getDate())).size}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            getDayRevenue(date) {
                const start = new Date(date.getFullYear(), date.getMonth(), date.getDate());
                const end = new Date(date.getFullYear(), date.getMonth(), date.getDate() + 1);
                return this.transactions
                    .filter(t => {
                        const d = new Date(t.createdAt);
                        return d >= start && d < end;
                    })
                    .reduce((s, t) => s + (t.amount || 0), 0);
            }

            navigate(delta) {
                this.currentMonth += delta;
                if (this.currentMonth < 0) { this.currentMonth = 11; this.currentYear--; }
                if (this.currentMonth > 11) { this.currentMonth = 0; this.currentYear++; }
                this.render();
            }

            goToday() {
                const today = new Date();
                this.currentMonth = today.getMonth();
                this.currentYear = today.getFullYear();
                this.render();
            }
        }

        // ========================================
        // REPORTS - WITH PAYMENT BREAKDOWN
        // ========================================
        class Reports {
            constructor(container) {
                this.container = container;
                this.transactions = storage.getTransactions();
                this.members = storage.getMembers();
                this.reportDate = new Date();
                this.reportType = 'daily';
            }

            render() {
                this.container.innerHTML = `
                    <div class="dashboard-page">
                        <h1 style="font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:var(--spacing-lg);">Reports</h1>

                        <div style="display:flex;gap:var(--spacing-xs);margin-bottom:var(--spacing-lg);background:var(--bg-tertiary);padding:4px;border-radius:var(--radius-full);width:fit-content;">
                            <button class="btn ${this.reportType === 'daily' ? 'btn-primary' : 'btn-secondary'}" onclick="app.reports.setType('daily')">📊 Daily</button>
                            <button class="btn ${this.reportType === 'monthly' ? 'btn-primary' : 'btn-secondary'}" onclick="app.reports.setType('monthly')">📈 Monthly</button>
                        </div>

                        ${this.reportType === 'daily' ? this.renderDaily() : this.renderMonthly()}
                    </div>
                `;
            }

            setType(type) {
                this.reportType = type;
                this.render();
            }

            renderDaily() {
                const date = this.reportDate;
                const start = new Date(date.getFullYear(), date.getMonth(), date.getDate());
                const end = new Date(date.getFullYear(), date.getMonth(), date.getDate() + 1);

                const dailyTransactions = this.transactions.filter(t => {
                    const d = new Date(t.createdAt);
                    return d >= start && d < end;
                });

                const revenue = dailyTransactions.reduce((sum, t) => sum + (t.amount || 0), 0);
                const count = dailyTransactions.length;

                // Payment Breakdown
                const paymentBreakdown = dailyTransactions.reduce((acc, t) => {
                    const method = t.paymentMethod || 'Unknown';
                    if (!acc[method]) acc[method] = { count: 0, revenue: 0 };
                    acc[method].count++;
                    acc[method].revenue += t.amount || 0;
                    return acc;
                }, {});

                // Product Breakdown
                const productBreakdown = dailyTransactions.reduce((acc, t) => {
                    const product = t.product || 'Unknown';
                    if (!acc[product]) acc[product] = { count: 0, revenue: 0 };
                    acc[product].count++;
                    acc[product].revenue += t.amount || 0;
                    return acc;
                }, {});

                const paymentColors = {
                    'KPay': { bg: 'rgba(0,122,255,0.15)', color: '#007AFF', icon: '💳' },
                    'Wave Pay': { bg: 'rgba(255,204,0,0.15)', color: '#B8860B', icon: '📱' },
                    'Aya Pay': { bg: 'rgba(255,59,48,0.15)', color: '#FF3B30', icon: '🏦' }
                };

                return `
                    <div style="background:var(--glass-bg);border-radius:var(--radius-lg);padding:var(--spacing-lg);border:1px solid var(--glass-border);backdrop-filter:blur(20px);">
                        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--spacing-sm);margin-bottom:var(--spacing-lg);">
                            <h2>📊 ${date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</h2>
                            <div style="display:flex;gap:var(--spacing-sm);">
                                <input type="date" value="${date.toISOString().split('T')[0]}" 
                                       onchange="app.reports.changeDate(this.value)" 
                                       style="padding:8px 14px;border:1px solid var(--border-color);border-radius:var(--radius-full);background:var(--bg-secondary);font-family:var(--font-family);">
                                <button class="btn btn-primary" onclick="app.reports.exportPDF()">📄 PDF</button>
                                <button class="btn btn-success" onclick="app.reports.exportCSV()">📊 CSV</button>
                            </div>
                        </div>

                        <!-- Summary Stats -->
                        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--spacing-md);margin-bottom:var(--spacing-lg);">
                            <div style="background:var(--bg-tertiary);padding:var(--spacing-md);border-radius:var(--radius-sm);text-align:center;">
                                <div style="font-size:11px;color:var(--text-secondary);">💰 Revenue</div>
                                <div style="font-size:21px;font-weight:700;">${UI.formatCurrency(revenue)}</div>
                            </div>
                            <div style="background:var(--bg-tertiary);padding:var(--spacing-md);border-radius:var(--radius-sm);text-align:center;">
                                <div style="font-size:11px;color:var(--text-secondary);">📝 Transactions</div>
                                <div style="font-size:21px;font-weight:700;">${count}</div>
                            </div>
                            <div style="background:var(--bg-tertiary);padding:var(--spacing-md);border-radius:var(--radius-sm);text-align:center;">
                                <div style="font-size:11px;color:var(--text-secondary);">📊 Avg/Transaction</div>
                                <div style="font-size:21px;font-weight:700;">${count ? UI.formatCurrency(revenue / count) : UI.formatCurrency(0)}</div>
                            </div>
                        </div>

                        <!-- PAYMENT BREAKDOWN CARDS -->
                        <div style="background:var(--bg-secondary);border-radius:var(--radius-md);padding:var(--spacing-lg);margin-bottom:var(--spacing-lg);border:2px solid var(--primary);box-shadow:var(--shadow-hover);">
                            <h3 style="margin-bottom:var(--spacing-md);font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--primary);">
                                💳 Payment Breakdown
                                <span style="font-size:13px;font-weight:400;color:var(--text-secondary);margin-left:auto;">
                                    ${Object.keys(paymentBreakdown).length} payment method(s)
                                </span>
                            </h3>
                            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--spacing-md);">
                                ${Object.keys(paymentBreakdown).length === 0 ? `
                                    <div style="grid-column:1/-1;text-align:center;color:var(--text-secondary);padding:var(--spacing-xl);background:var(--bg-tertiary);border-radius:var(--radius-md);">
                                        <div style="font-size:48px;margin-bottom:var(--spacing-sm);">💳</div>
                                        <p style="font-size:15px;">No payments for this day</p>
                                        <p style="font-size:12px;">Add members with different payment methods</p>
                                    </div>
                                ` : Object.entries(paymentBreakdown).map(([method, data]) => {
                                    const colors = paymentColors[method] || { bg: 'var(--bg-tertiary)', color: 'var(--text-secondary)', icon: '💰' };
                                    const percent = revenue > 0 ? ((data.revenue / revenue) * 100).toFixed(1) : 0;
                                    return `
                                        <div style="background:${colors.bg};padding:var(--spacing-lg);border-radius:var(--radius-md);text-align:center;border:2px solid ${colors.color}40;">
                                            <div style="font-size:36px;">${colors.icon}</div>
                                            <div style="font-weight:700;color:${colors.color};font-size:16px;margin-top:4px;">${method}</div>
                                            <div style="font-size:24px;font-weight:700;margin:8px 0;color:var(--text-primary);">${UI.formatCurrency(data.revenue)}</div>
                                            <div style="font-size:13px;color:var(--text-secondary);">${data.count} transaction${data.count > 1 ? 's' : ''}</div>
                                            <div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">${percent}% of total</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <!-- PRODUCT BREAKDOWN CARDS -->
                        <div style="background:var(--bg-secondary);border-radius:var(--radius-md);padding:var(--spacing-lg);margin-bottom:var(--spacing-lg);border:1px solid var(--border-color);">
                            <h3 style="margin-bottom:var(--spacing-md);font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;">
                                📦 Product Breakdown
                            </h3>
                            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--spacing-md);">
                                ${Object.keys(productBreakdown).length === 0 ? `
                                    <div style="grid-column:1/-1;text-align:center;color:var(--text-secondary);padding:var(--spacing-md);">
                                        No products for this day
                                    </div>
                                ` : Object.entries(productBreakdown).map(([product, data]) => {
                                    const productColors = {
                                        'Doujinshi': { bg: 'rgba(88,86,214,0.15)', color: '#5856D6' },
                                        'Manhwa': { bg: 'rgba(255,149,0,0.15)', color: '#FF9500' }
                                    };
                                    const colors = productColors[product] || { bg: 'var(--bg-tertiary)', color: 'var(--text-secondary)' };
                                    return `
                                        <div style="background:${colors.bg};padding:var(--spacing-md);border-radius:var(--radius-md);text-align:center;border:2px solid ${colors.color}40;">
                                            <div style="font-weight:700;color:${colors.color};font-size:15px;">${product}</div>
                                            <div style="font-size:22px;font-weight:700;margin:6px 0;color:var(--text-primary);">${UI.formatCurrency(data.revenue)}</div>
                                            <div style="font-size:12px;color:var(--text-secondary);">${data.count} transaction${data.count > 1 ? 's' : ''}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <!-- Transaction List -->
                        <div style="max-height:400px;overflow-y:auto;">
                            ${dailyTransactions.length === 0 ? `
                                <div style="text-align:center;padding:var(--spacing-xl);color:var(--text-secondary);">
                                    No transactions for this day
                                </div>
                            ` : dailyTransactions.map(t => {
                                const member = storage.getMember(t.memberId);
                                const name = member ? member.username : 'Unknown';
                                return `
                                    <div style="display:flex;justify-content:space-between;padding:var(--spacing-sm);border-bottom:1px solid var(--border-color);">
                                        <div>
                                            <div style="font-weight:500;">${name}</div>
                                            <div style="font-size:12px;color:var(--text-secondary);">
                                                ${t.product || 'N/A'} • ${t.plan || 'N/A'} • ${t.paymentMethod || 'N/A'} • ${UI.formatDateTime(t.createdAt)}
                                            </div>
                                        </div>
                                        <div style="font-weight:600;color:#34C759;">${UI.formatCurrency(t.amount || 0)}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }

            renderMonthly() {
                const year = this.reportDate.getFullYear();
                const month = this.reportDate.getMonth();
                const start = new Date(year, month, 1);
                const end = new Date(year, month + 1, 1);

                const monthlyTransactions = this.transactions.filter(t => {
                    const d = new Date(t.createdAt);
                    return d >= start && d < end;
                });

                const totalRevenue = monthlyTransactions.reduce((sum, t) => sum + (t.amount || 0), 0);
                const totalTransactions = monthlyTransactions.length;

                // Payment Breakdown
                const paymentBreakdown = monthlyTransactions.reduce((acc, t) => {
                    const method = t.paymentMethod || 'Unknown';
                    if (!acc[method]) acc[method] = { count: 0, revenue: 0 };
                    acc[method].count++;
                    acc[method].revenue += t.amount || 0;
                    return acc;
                }, {});

                // Product Breakdown
                const productBreakdown = monthlyTransactions.reduce((acc, t) => {
                    const product = t.product || 'Unknown';
                    if (!acc[product]) acc[product] = { count: 0, revenue: 0 };
                    acc[product].count++;
                    acc[product].revenue += t.amount || 0;
                    return acc;
                }, {});

                // Daily table
                let dailyTable = '';
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                for (let d = 1; d <= daysInMonth; d++) {
                    const date = new Date(year, month, d);
                    const dayRevenue = this.getDayRevenue(date);
                    const dayCount = this.getDayCount(date);
                    dailyTable += `
                        <tr>
                            <td style="padding:4px 8px;border-bottom:1px solid var(--border-color);">${d}</td>
                            <td style="padding:4px 8px;border-bottom:1px solid var(--border-color);">${date.toLocaleDateString('en-US', { weekday: 'short' })}</td>
                            <td style="padding:4px 8px;border-bottom:1px solid var(--border-color);text-align:right;">${UI.formatCurrency(dayRevenue)}</td>
                            <td style="padding:4px 8px;border-bottom:1px solid var(--border-color);text-align:center;">${dayCount}</td>
                        </tr>
                    `;
                }

                const paymentColors = {
                    'KPay': { bg: 'rgba(0,122,255,0.15)', color: '#007AFF', icon: '💳' },
                    'Wave Pay': { bg: 'rgba(255,204,0,0.15)', color: '#B8860B', icon: '📱' },
                    'Aya Pay': { bg: 'rgba(255,59,48,0.15)', color: '#FF3B30', icon: '🏦' }
                };

                return `
                    <div style="background:var(--glass-bg);border-radius:var(--radius-lg);padding:var(--spacing-lg);border:1px solid var(--glass-border);backdrop-filter:blur(20px);">
                        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--spacing-sm);margin-bottom:var(--spacing-lg);">
                            <h2>📈 ${start.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</h2>
                            <div style="display:flex;gap:var(--spacing-sm);">
                                <input type="month" value="${year}-${String(month + 1).padStart(2, '0')}" 
                                       onchange="app.reports.changeMonth(this.value)" 
                                       style="padding:8px 14px;border:1px solid var(--border-color);border-radius:var(--radius-full);background:var(--bg-secondary);font-family:var(--font-family);">
                                <button class="btn btn-primary" onclick="app.reports.exportPDF()">📄 PDF</button>
                                <button class="btn btn-success" onclick="app.reports.exportCSV()">📊 CSV</button>
                            </div>
                        </div>

                        <!-- Summary Stats -->
                        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--spacing-md);margin-bottom:var(--spacing-lg);">
                            <div style="background:var(--bg-tertiary);padding:var(--spacing-md);border-radius:var(--radius-sm);text-align:center;">
                                <div style="font-size:11px;color:var(--text-secondary);">💰 Total Revenue</div>
                                <div style="font-size:21px;font-weight:700;">${UI.formatCurrency(totalRevenue)}</div>
                            </div>
                            <div style="background:var(--bg-tertiary);padding:var(--spacing-md);border-radius:var(--radius-sm);text-align:center;">
                                <div style="font-size:11px;color:var(--text-secondary);">📝 Transactions</div>
                                <div style="font-size:21px;font-weight:700;">${totalTransactions}</div>
                            </div>
                            <div style="background:var(--bg-tertiary);padding:var(--spacing-md);border-radius:var(--radius-sm);text-align:center;">
                                <div style="font-size:11px;color:var(--text-secondary);">📊 Avg/Day</div>
                                <div style="font-size:21px;font-weight:700;">${UI.formatCurrency(daysInMonth ? totalRevenue / daysInMonth : 0)}</div>
                            </div>
                            <div style="background:var(--bg-tertiary);padding:var(--spacing-md);border-radius:var(--radius-sm);text-align:center;">
                                <div style="font-size:11px;color:var(--text-secondary);">🆕 New Members</div>
                                <div style="font-size:21px;font-weight:700;">${this.members.filter(m => { const d = new Date(m.createdAt); return d >= start && d < end; }).length}</div>
                            </div>
                        </div>

                        <!-- PAYMENT BREAKDOWN CARDS -->
                        <div style="background:var(--bg-secondary);border-radius:var(--radius-md);padding:var(--spacing-lg);margin-bottom:var(--spacing-lg);border:2px solid var(--primary);box-shadow:var(--shadow-hover);">
                            <h3 style="margin-bottom:var(--spacing-md);font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--primary);">
                                💳 Payment Breakdown (Monthly)
                                <span style="font-size:13px;font-weight:400;color:var(--text-secondary);margin-left:auto;">
                                    ${Object.keys(paymentBreakdown).length} payment method(s)
                                </span>
                            </h3>
                            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--spacing-md);">
                                ${Object.keys(paymentBreakdown).length === 0 ? `
                                    <div style="grid-column:1/-1;text-align:center;color:var(--text-secondary);padding:var(--spacing-xl);background:var(--bg-tertiary);border-radius:var(--radius-md);">
                                        <div style="font-size:48px;margin-bottom:var(--spacing-sm);">💳</div>
                                        <p style="font-size:15px;">No payments for this month</p>
                                        <p style="font-size:12px;">Add members with different payment methods</p>
                                    </div>
                                ` : Object.entries(paymentBreakdown).map(([method, data]) => {
                                    const colors = paymentColors[method] || { bg: 'var(--bg-tertiary)', color: 'var(--text-secondary)', icon: '💰' };
                                    const percent = totalRevenue > 0 ? ((data.revenue / totalRevenue) * 100).toFixed(1) : 0;
                                    return `
                                        <div style="background:${colors.bg};padding:var(--spacing-lg);border-radius:var(--radius-md);text-align:center;border:2px solid ${colors.color}40;">
                                            <div style="font-size:36px;">${colors.icon}</div>
                                            <div style="font-weight:700;color:${colors.color};font-size:16px;margin-top:4px;">${method}</div>
                                            <div style="font-size:24px;font-weight:700;margin:8px 0;color:var(--text-primary);">${UI.formatCurrency(data.revenue)}</div>
                                            <div style="font-size:13px;color:var(--text-secondary);">${data.count} transaction${data.count > 1 ? 's' : ''}</div>
                                            <div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">${percent}% of total</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <!-- PRODUCT BREAKDOWN CARDS -->
                        <div style="background:var(--bg-secondary);border-radius:var(--radius-md);padding:var(--spacing-lg);margin-bottom:var(--spacing-lg);border:1px solid var(--border-color);">
                            <h3 style="margin-bottom:var(--spacing-md);font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;">
                                📦 Product Breakdown (Monthly)
                            </h3>
                            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--spacing-md);">
                                ${Object.keys(productBreakdown).length === 0 ? `
                                    <div style="grid-column:1/-1;text-align:center;color:var(--text-secondary);padding:var(--spacing-md);">
                                        No products for this month
                                    </div>
                                ` : Object.entries(productBreakdown).map(([product, data]) => {
                                    const productColors = {
                                        'Doujinshi': { bg: 'rgba(88,86,214,0.15)', color: '#5856D6' },
                                        'Manhwa': { bg: 'rgba(255,149,0,0.15)', color: '#FF9500' }
                                    };
                                    const colors = productColors[product] || { bg: 'var(--bg-tertiary)', color: 'var(--text-secondary)' };
                                    return `
                                        <div style="background:${colors.bg};padding:var(--spacing-md);border-radius:var(--radius-md);text-align:center;border:2px solid ${colors.color}40;">
                                            <div style="font-weight:700;color:${colors.color};font-size:15px;">${product}</div>
                                            <div style="font-size:22px;font-weight:700;margin:6px 0;color:var(--text-primary);">${UI.formatCurrency(data.revenue)}</div>
                                            <div style="font-size:12px;color:var(--text-secondary);">${data.count} transaction${data.count > 1 ? 's' : ''}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <!-- Daily Table -->
                        <div style="max-height:400px;overflow-y:auto;">
                            <table style="width:100%;border-collapse:collapse;font-size:13px;">
                                <thead>
                                    <tr>
                                        <th style="text-align:left;padding:var(--spacing-xs);border-bottom:2px solid var(--border-color);color:var(--text-secondary);font-size:11px;text-transform:uppercase;">Day</th>
                                        <th style="text-align:left;padding:var(--spacing-xs);border-bottom:2px solid var(--border-color);color:var(--text-secondary);font-size:11px;text-transform:uppercase;">Weekday</th>
                                        <th style="text-align:right;padding:var(--spacing-xs);border-bottom:2px solid var(--border-color);color:var(--text-secondary);font-size:11px;text-transform:uppercase;">Revenue</th>
                                        <th style="text-align:center;padding:var(--spacing-xs);border-bottom:2px solid var(--border-color);color:var(--text-secondary);font-size:11px;text-transform:uppercase;">Txs</th>
                                    </tr>
                                </thead>
                                <tbody>${dailyTable}</tbody>
                            </table>
                        </div>
                    </div>
                `;
            }

            getDayRevenue(date) {
                const start = new Date(date.getFullYear(), date.getMonth(), date.getDate());
                const end = new Date(date.getFullYear(), date.getMonth(), date.getDate() + 1);
                return this.transactions
                    .filter(t => {
                        const d = new Date(t.createdAt);
                        return d >= start && d < end;
                    })
                    .reduce((sum, t) => sum + (t.amount || 0), 0);
            }

            getDayCount(date) {
                const start = new Date(date.getFullYear(), date.getMonth(), date.getDate());
                const end = new Date(date.getFullYear(), date.getMonth(), date.getDate() + 1);
                return this.transactions
                    .filter(t => {
                        const d = new Date(t.createdAt);
                        return d >= start && d < end;
                    }).length;
            }

            changeDate(value) {
                this.reportDate = new Date(value);
                this.render();
            }

            changeMonth(value) {
                const [year, month] = value.split('-');
                this.reportDate = new Date(parseInt(year), parseInt(month) - 1);
                this.render();
            }

            exportPDF() {
                UI.toast('📄 Opening print dialog...', 'info');
                setTimeout(() => window.print(), 500);
            }

            exportCSV() {
                UI.toast('📊 Generating CSV...', 'info');
                const date = this.reportDate;
                const start = new Date(date.getFullYear(), date.getMonth(), date.getDate());
                const end = new Date(date.getFullYear(), date.getMonth(), date.getDate() + 1);
                const txs = this.transactions.filter(t => {
                    const d = new Date(t.createdAt);
                    return d >= start && d < end;
                });

                let csv = 'Username,Product,Plan,Amount,Payment,Date\n';
                txs.forEach(t => {
                    const m = storage.getMember(t.memberId);
                    csv += `${m ? m.username : 'Unknown'},${t.product},${t.plan},${t.amount},${t.paymentMethod},${t.createdAt}\n`;
                });

                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `report-${date.toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                UI.toast('✅ CSV exported successfully!', 'success');
            }
        }

        // ========================================
        // MAIN APP
        // ========================================
        class App {
            constructor() {
                this.currentPage = 'dashboard';
                this.dashboard = null;
                this.members = null;
                this.analytics = null;
                this.calendar = null;
                this.reports = null;

                this.mainContent = document.getElementById('mainContent');
                this.navLinks = document.querySelectorAll('.nav-link[data-page]');
                this.themeToggle = document.getElementById('themeToggle');
                this.globalSearch = document.getElementById('globalSearch');

                this.init();
            }

            init() {
                this.loadTheme();
                this.setupNavigation();
                this.navigateTo('dashboard');

                this.themeToggle.addEventListener('click', () => this.toggleTheme());

                if (this.globalSearch) {
                    this.globalSearch.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            const query = e.target.value.trim();
                            if (query) {
                                this.navigateTo('members');
                                setTimeout(() => {
                                    const searchInput = document.getElementById('memberSearch');
                                    if (searchInput) {
                                        searchInput.value = query;
                                        searchInput.dispatchEvent(new Event('input'));
                                    }
                                }, 100);
                            }
                        }
                    });
                }

                this.updateDateTime();
                setInterval(() => this.updateDateTime(), 10000);

                console.log('Membership Manager Pro initialized!');
            }

            setupNavigation() {
                this.navLinks.forEach(link => {
                    link.addEventListener('click', () => {
                        const page = link.dataset.page;
                        if (page === 'settings') {
                            this.loadSettings();
                            return;
                        }
                        this.navigateTo(page);
                    });
                });
            }

            navigateTo(page) {
                this.navLinks.forEach(link => {
                    link.classList.toggle('active', link.dataset.page === page);
                });

                this.loadPage(page);
                this.currentPage = page;
            }

            loadPage(page) {
                switch (page) {
                    case 'dashboard':
                        if (!this.dashboard) this.dashboard = new Dashboard(this.mainContent);
                        this.dashboard.render();
                        break;
                    case 'members':
                        if (!this.members) this.members = new Members(this.mainContent);
                        this.members.render();
                        break;
                    case 'analytics':
                        if (!this.analytics) this.analytics = new Analytics(this.mainContent);
                        this.analytics.render();
                        break;
                    case 'calendar':
                        if (!this.calendar) this.calendar = new Calendar(this.mainContent);
                        this.calendar.render();
                        break;
                    case 'reports':
                        if (!this.reports) this.reports = new Reports(this.mainContent);
                        this.reports.render();
                        break;
                    default:
                        this.loadSettings();
                }
            }

            loadSettings() {
                const stats = storage.getStats();
                this.mainContent.innerHTML = `
                    <div class="dashboard-page">
                        <h1 style="font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:var(--spacing-lg);">Settings</h1>
                        <div style="background:var(--glass-bg);border-radius:var(--radius-lg);padding:var(--spacing-lg);border:1px solid var(--glass-border);backdrop-filter:blur(20px);">
                            <h2 style="margin-bottom:var(--spacing-lg);">Data Management</h2>
                            <div style="display:flex;gap:var(--spacing-md);flex-wrap:wrap;margin-bottom:var(--spacing-lg);">
                                <button class="btn btn-primary" onclick="app.exportData()">📤 Export Data</button>
                                <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📥 Import Data</button>
                                <input type="file" id="importFile" accept=".json" style="display:none;" onchange="app.importData(event)">
                                <button class="btn btn-danger" onclick="app.clearData()">🗑️ Clear All Data</button>
                            </div>
                            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--spacing-md);padding-top:var(--spacing-md);border-top:1px solid var(--border-color);">
                                <div><strong>Total Members:</strong> ${stats.totalMembers}</div>
                                <div><strong>Transactions:</strong> ${stats.totalTransactions}</div>
                                <div><strong>Total Revenue:</strong> ${UI.formatCurrency(stats.totalRevenue)}</div>
                                <div><strong>Storage:</strong> ${(stats.storageUsed / 1024).toFixed(2)} KB</div>
                                <div><strong>Updated:</strong> ${new Date(stats.lastUpdated).toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            loadTheme() {
                const saved = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', saved);
                this.updateThemeIcon(saved);
            }

            toggleTheme() {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                this.updateThemeIcon(next);
            }

            updateThemeIcon(theme) {
                const svg = this.themeToggle.querySelector('svg');
                if (theme === 'dark') {
                    svg.innerHTML = `
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    `;
                } else {
                    svg.innerHTML = `
                        <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.5 5.5 0 0 1-7.54-7.54c-.44-.06-.9-.1-1.36-.1z"/>
                    `;
                }
            }

            updateDateTime() {
                const now = new Date();
                const dateEl = document.getElementById('currentDate');
                const timeEl = document.getElementById('currentTime');

                if (dateEl) {
                    dateEl.textContent = now.toLocaleDateString('en-US', {
                        month: 'numeric',
                        day: 'numeric',
                        year: 'numeric'
                    });
                }

                if (timeEl) {
                    let h = now.getHours();
                    const ampm = h >= 12 ? 'PM' : 'AM';
                    h = h % 12 || 12;
                    const m = String(now.getMinutes()).padStart(2, '0');
                    timeEl.textContent = `${h}:${m}${ampm}`;
                }
            }

            exportData() {
                const data = storage.exportData();
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `membership_data_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                UI.toast('Data exported successfully!', 'success');
            }

            importData(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    if (confirm('This will replace ALL current data. Continue?')) {
                        if (storage.importData(e.target.result)) {
                            UI.toast('Data imported successfully!', 'success');
                            this.dashboard = null;
                            this.members = null;
                            this.analytics = null;
                            this.calendar = null;
                            this.reports = null;
                            this.navigateTo(this.currentPage);
                        } else {
                            UI.toast('Error importing data.', 'error');
                        }
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            }

            clearData() {
                if (confirm('⚠️ Delete ALL data? This cannot be undone!')) {
                    storage.clearAllData();
                    UI.toast('All data cleared.', 'warning');
                    this.dashboard = null;
                    this.members = null;
                    this.analytics = null;
                    this.calendar = null;
                    this.reports = null;
                    this.navigateTo(this.currentPage);
                }
            }
        }

        // ----- INITIALIZE -----
        document.addEventListener('DOMContentLoaded', () => {
            window.app = new App();
        });
    </script>
</body>
</html>
